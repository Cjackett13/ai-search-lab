<!DOCTYPE html>
<html>
<body>
<script src="puzzle.js"></script>
<script src="solvers.js"></script>
<script>
  // Test 1: boardToString
  console.log(boardToString([[1,2,3],[4,5,6],[7,8,0]]));
  // expected: "1,2,3,4,5,6,7,8,0,"

  // Test 2: goal detection
  console.log(checkIfGoalReached([[1,2,3],[4,5,6],[7,8,0]])); // true
  console.log(checkIfGoalReached([[3,1,2],[0,4,6],[8,7,5]])); // false

  // Test 3: easy 1-move solve
  let easy = solveBFS([[1,2,3],[4,5,6],[7,0,8]]);
  console.log("BFS easy moves:", easy.path.length - 1); // should be 1

  // Test 4: standardized report puzzle
  let bfs = solveBFS([[8,1,3],[4,0,2],[7,6,5]]);
  console.log("BFS nodes:", bfs.nodesExplored, "moves:", bfs.path.length - 1);

  let astar = solveAStar([[8,1,3],[4,0,2],[7,6,5]]);
  console.log("A* nodes:", astar.nodesExplored, "moves:", astar.path.length - 1);

  let dijk = solveDijkstra([[8,1,3],[4,0,2],[7,6,5]]);
  console.log("Dijkstra nodes:", dijk.nodesExplored, "moves:", dijk.path.length - 1);
  
</script>
</body>
</html>
